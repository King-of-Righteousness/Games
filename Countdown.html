
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  .ct-root *, .ct-root *::before, .ct-root *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .ct-root {
    --bg: var(--color-background-tertiary, #f4f3f0);
    --surface: var(--color-background-primary, #fff);
    --border: var(--color-border-tertiary);
    --accent: #7c6af7;
    --accent-glow: rgba(124, 106, 247, 0.18);
    --danger: #e24b4a;
    --text: var(--color-text-primary);
    --muted: var(--color-text-secondary);
    --green: #3b9e6a;
    min-height: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: 'DM Sans', var(--font-sans), sans-serif;
  }

  .ct-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--border-radius-xl, 20px);
    padding: 36px 40px 32px;
    width: 380px;
    max-width: 96vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transition: border-color 0.3s;
  }

  .ct-card.flash { border-color: var(--danger); }

  .ct-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .ct-dot-row { display: flex; gap: 7px; }

  .ct-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .ct-dot.active { background: var(--accent); }
  .ct-dot.danger { background: var(--danger); }

  .ct-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .ct-display-wrap {
    position: relative;
    width: 230px;
    height: 230px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ct-ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    pointer-events: none;
  }

  .ct-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .ct-ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.95s linear, stroke 0.3s;
  }

  .ct-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .ct-number {
    font-family: 'DM Mono', var(--font-mono), monospace;
    font-size: 68px;
    font-weight: 500;
    letter-spacing: -3px;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
  }
  .ct-number.danger { color: var(--danger); }

  .ct-unit {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .ct-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: var(--color-background-secondary, rgba(0,0,0,0.03));
    border: 0.5px solid var(--border);
    border-radius: var(--border-radius-md, 8px);
    padding: 10px 14px;
  }
  .ct-input-row label { font-size: 13px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .ct-input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', var(--font-mono), monospace;
    font-size: 16px;
    font-weight: 500;
    text-align: right;
    min-width: 0;
  }
  .ct-input-row input::-webkit-inner-spin-button,
  .ct-input-row input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .ct-set-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md, 8px);
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .ct-set-btn:hover { opacity: 0.85; }

  .ct-presets { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; width: 100%; }
  .ct-chip {
    font-size: 12px;
    font-weight: 600;
    padding: 5px 13px;
    border-radius: 100px;
    background: var(--color-background-secondary, rgba(0,0,0,0.04));
    border: 0.5px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .ct-chip:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  .ct-controls { display: flex; gap: 10px; width: 100%; }
  .ct-btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: var(--border-radius-md, 8px);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .ct-btn:active { transform: scale(0.97); }
  .ct-btn-start { background: var(--accent); color: #fff; }
  .ct-btn-start:hover { opacity: 0.9; }
  .ct-btn-reset {
    background: var(--color-background-secondary, rgba(0,0,0,0.04));
    color: var(--muted);
    border: 0.5px solid var(--border);
  }
  .ct-btn-reset:hover { color: var(--text); }

  .ct-status {
    font-size: 12px;
    color: var(--muted);
    height: 16px;
    text-align: center;
    transition: color 0.3s;
  }
  .ct-status.ok { color: var(--green); }
  .ct-status.err { color: var(--danger); }
</style>

<div class="ct-root">
  <div class="ct-card" id="ctCard">

    <div class="ct-header">
      <div class="ct-dot-row">
        <div class="ct-dot" id="d1"></div>
        <div class="ct-dot" id="d2"></div>
        <div class="ct-dot" id="d3"></div>
        <div class="ct-dot" id="d4"></div>
        <div class="ct-dot" id="d5"></div>
      </div>
      <span class="ct-label">Countdown Timer</span>
    </div>

    <div class="ct-display-wrap">
      <svg class="ct-ring-svg" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg">
        <circle class="ct-ring-bg" cx="115" cy="115" r="104"/>
        <circle class="ct-ring-progress" id="ctRing" cx="115" cy="115" r="104"/>
      </svg>
      <div class="ct-inner">
        <div class="ct-number" id="ctDisplay">30</div>
        <div class="ct-unit" id="ctUnit">seconds</div>
      </div>
    </div>

    <div class="ct-input-row">
      <label for="ctInput">Set time</label>
      <input id="ctInput" type="number" min="1" max="36000" value="30" placeholder="sec">
      <button class="ct-set-btn" id="ctSetBtn">Set</button>
    </div>

    <div class="ct-presets">
      <div class="ct-chip" data-preset="30">30s</div>
      <div class="ct-chip" data-preset="60">1m</div>
      <div class="ct-chip" data-preset="300">5m</div>
      <div class="ct-chip" data-preset="600">10m</div>
      <div class="ct-chip" data-preset="1800">30m</div>
    </div>

    <div class="ct-controls">
      <button class="ct-btn ct-btn-start" id="ctStartBtn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor" aria-hidden="true"><path d="M3 2l8 4.5L3 11V2z"/></svg>
        Start
      </button>
      <button class="ct-btn ct-btn-reset" id="ctResetBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M11.5 7A4.5 4.5 0 1 1 7 2.5h3M10 1v3H7"/></svg>
        Reset
      </button>
    </div>

    <div class="ct-status" id="ctMsg"></div>
  </div>
</div>

<script>
(function() {
  const CIRC = 2 * Math.PI * 104;
  let total = 30, remaining = 30, interval = null;

  const card = document.getElementById('ctCard');
  const display = document.getElementById('ctDisplay');
  const unit = document.getElementById('ctUnit');
  const ring = document.getElementById('ctRing');
  const input = document.getElementById('ctInput');
  const startBtn = document.getElementById('ctStartBtn');
  const resetBtn = document.getElementById('ctResetBtn');
  const setBtn = document.getElementById('ctSetBtn');
  const msg = document.getElementById('ctMsg');
  const dots = document.querySelectorAll('.ct-dot');

  ring.style.strokeDasharray = CIRC;

  function fmt(s) {
    if (s >= 3600) {
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }
    if (s >= 60) {
      return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }
    return String(s);
  }

  function unitLabel(s) {
    if (s >= 3600) return 'hr : min : sec';
    if (s >= 60) return 'min : sec';
    return s === 1 ? 'second' : 'seconds';
  }

  function updateDots() {
    const pct = total > 0 ? remaining / total : 0;
    const active = Math.ceil(pct * dots.length);
    const isDanger = remaining <= 5 && remaining > 0;
    dots.forEach((d, i) => {
      d.classList.remove('active', 'danger');
      if (i < active) d.classList.add(isDanger ? 'danger' : 'active');
    });
  }

  function refresh() {
    display.textContent = fmt(remaining);
    unit.textContent = unitLabel(remaining);
    const isDanger = remaining <= 5 && remaining > 0;
    display.classList.toggle('danger', isDanger);
    ring.style.stroke = isDanger ? 'var(--danger)' : 'var(--accent)';
    const pct = total > 0 ? remaining / total : 0;
    ring.style.strokeDashoffset = CIRC * (1 - pct);
    updateDots();
  }

  function setMsg(text, type) {
    msg.textContent = text || '';
    msg.className = 'ct-status' + (type ? ' ' + type : '');
  }

  function applySet(silent) {
    if (interval) { setMsg('Stop or reset before changing time.', 'err'); return; }
    const v = parseInt(input.value, 10);
    if (!Number.isFinite(v) || v < 1) { setMsg('Enter a valid number ≥ 1.', 'err'); return; }
    total = v; remaining = v;
    refresh();
    if (!silent) setMsg('Timer set to ' + (v < 60 ? v + 's' : Math.floor(v/60) + 'm' + (v%60?' '+v%60+'s':'')), 'ok');
  }

  function setRunningState(running) {
    if (running) {
      startBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor" aria-hidden="true"><rect x="2" y="2" width="3" height="8" rx="1"/><rect x="7" y="2" width="3" height="8" rx="1"/></svg> Running';
      startBtn.style.opacity = '0.6';
      startBtn.style.cursor = 'default';
    } else {
      startBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor" aria-hidden="true"><path d="M3 2l8 4.5L3 11V2z"/></svg> Start';
      startBtn.style.opacity = '';
      startBtn.style.cursor = '';
    }
  }

  startBtn.addEventListener('click', () => {
    if (interval) return;
    if (remaining <= 0) remaining = total;
    setMsg('');
    setRunningState(true);
    interval = setInterval(() => {
      remaining--;
      refresh();
      card.classList.toggle('flash', remaining <= 5 && remaining > 0);
      if (remaining === 0) {
        clearInterval(interval); interval = null;
        card.classList.remove('flash');
        setMsg("Time's up!", 'err');
        setRunningState(false);
        updateDots();
      }
    }, 1000);
  });

  resetBtn.addEventListener('click', () => {
    clearInterval(interval); interval = null;
    card.classList.remove('flash');
    remaining = total;
    refresh(); setMsg('');
    setRunningState(false);
  });

  setBtn.addEventListener('click', () => applySet(false));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') applySet(false); });

  document.querySelectorAll('.ct-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (interval) { setMsg('Reset before changing time.', 'err'); return; }
      input.value = chip.dataset.preset;
      applySet(true);
    });
  });

  input.value = total;
  refresh();
})();
</script>
